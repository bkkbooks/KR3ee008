穴法歌穴法淺深隨指中砭焫尤加顯妙功勸君若治諸般病何不專心記玉龍聖人授此玉龍歌瀉補分明切莫差祖師定穴通神妙說與良醫慎重加穴法相應三十七穴承漿應風府風池應合谷迎香應上星翳風應合谷聽會應合谷啞門應人中攢竹應太陽太陰應合谷睛明內迎香應合谷人中應委中腎俞應委中髖骨應風市足三里應膏肓肩井應足三里陽陵泉應支溝崑崙應命門崑崙應行間申脈應合谷太衝應崑崙髖骨應曲池肩井應支溝尺澤應曲池肩髃應髖骨間使應百勞關衝應支溝中渚應人中少衝應上星後谿應百勞神門應後谿通里應心俞百勞應肺俞膏肓應足三里風門應列缺照海應崑崙鳩尾應神門中極應白環俞天樞應脾俞註解標幽賦拯救之法妙用者針察歲時於天道定形氣於人心春夏瘦而刺淺秋冬肥而刺深不窮經絡陰陽多逢刺禁既論臟腑虛實須向經尋第一韻專論針刺之當謹慎不可造次須辨經絡陰陽臟腑虛實而行補瀉也原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後第二韻專明十二經脈常行之度一日一周自寅手太陰之脈穴出雲門也至醜足厥陰之脈穴出期門也為終周而復始循環與滴漏天度無差號曰鬥合人統也正經十二別絡走三百餘支十二經絡督任兩經貫串三百六十餘穴以同日度並諸絡十二經奇經八脈皇絡孫絡橫絡絲絡末取盡名然不過一晝夜脈行一萬三千五百息血行八百一十丈一周而已矣正側偃伏氣血有六百餘候背為陽行於陰俞腹為陰行於陽俞總三百六十餘穴左右脅肋合穴六百餘候手足三陽手走頭而頭走足手足三陰足走腹而胸走手手三陽從手走至頭足三陽從頭走至足足三陰從足走至腹手三陰從胸走至手難經所載明矣要識迎隨須明逆順順經絡而刺是謂補逆經絡而刺是謂瀉手法在人依經用度況乎陰陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位先詳多少之宜次察應至之氣氣血多少已注經絡不必重論輕滑慢而未來沉澀緊而已至指彈其穴穴下氣輕滑慢氣未至也勿刺待氣至方可刺也穴下氣來沉澀而急即可刺也既至也量寒熱而留疾未至者據虛實而候氣氣至也可留則留可速則速寒則留熱則速不可失時候氣未至或進或退或按或提等引氣至方可刺也氣之至也若魚吞鉤餌之浮沉氣至穴下若魚吞鉤若蟻奔走或浮或沉也氣未至也似潛處幽堂之深邃穴下氣不至若虛堂無人刺之無功不可刺也氣至速而效速氣至遲而不治氣之至也刺之即愈氣未至也如刺繡工徒勞人爾觀夫九針之法毫針最微七星可應眾穴主持古針有九名毫針按七星斡運璇璣最為常用也本形金也有蠲邪扶正之道金者剛健中正之性可以去邪扶持正氣也本形言針之為物短長水也有決凝開滯之機水有開山穿石之力以潤下為功針之短長深淺如水之用也定刺象木或斜或正斜刺可曲可直可斜可正猶木之曲直也口藏比火進陽補羸口溫針熱補調榮衛毋令冷熱相傷猶火之能炎上也循機捫而可塞以象土實應五行而可知土可以塞水針可以塞病源是以象土也一針之用五行俱全然是一寸六分包含妙理雖細楨於毫髮同貫多岐恆所用者毫針也按黃帝銅人流注之法肘前膝下一寸六分只有八分為針柄是針二寸四分也按氣血經絡變化無方惟針所治可平五臟之寒熱能調六臟之虛實臟腑要分表裡虛實寒熱針法在斯矣拘攣閉塞遣八邪而去矣寒熱痛痹開四關而已之太乙移宮之日八風之邪主人寒熱頭痛若開闢四關病可除也四關者兩手兩足刺之而已矣正所謂六十六穴之中也凡刺者使本神朝而後入既刺也使本神定而氣隨神不朝而勿刺神已定而可施神者脈也脈息見於穴下氣至可刺之脈息不至則不均不全則不定穴下氣分不可刺也至慎至慎定腳處取氣血為主意下手處認水土是根基先佔口鼻呼吸勻者可刺水土者太谿衝陽也絕則勿刺焉天地人三才也湧泉同璇璣百會百會在頂應天主乎氣湧泉在足底應地主乎精璇璣在胸應人主乎神得之者生失之者亡應乎三才者也上中下三部也大包與天樞地機上中下三部謂之三要大包在腋下三寸主脾之大絡一要也天樞者挾臍旁二寸謂之關二要也地機者脾舍之郄在膝下五寸下部之總三要也陽蹺陽維並督脈主肩背腰腿在表之病督脈起下極之俞主肩背夾脊之病陽蹺在足外踝下白肉際足太陽膀胱穴陽維在膀胱下命門穴與督脈皆屬陽為補瀉兼治脛酸身顫癲癇之疾督脈為陽脈之海陰蹺陰維任帶沖去心腹脅肋在裡之疑任脈起中極之俞上毛際曲骨俞衝脈起氣衝並足陽明至胸散諸部中帶脈起於季脅下一寸八分周迴一身與任脈同治陰脈之海也陰蹺起於跟中陰維起於諸陰交會處所治腹裡諸疾也二陵二蹺二交似續而交五太兩間兩商兩井相依而列兩肢兩肢當作四肢陽陵泉陰陵泉陽蹺陰蹺交信交儀五太者相接太衝太白太谿太淵太陵商丘商陽二間三間天井肩井相依乎手足四肢也上下左右前後內外交平而百病可治也足見取穴之法必有分寸先審自意次觀肉分或伸屈而得之或平直而安定在陽部筋骨之側陷下為真在陰分郄膕之間動脈相應取穴莫熟於分寸詳字意最緊手背足背脊背陽部在兩筋之旁以指按陷下者是穴手心腳底腹肚陰之分在筋骨郄膕之間以指下動脈應之是穴也取五穴用一穴而必端取三經使一經而可正取五穴者謂如陽經用甲丙戊庚壬時取一時分井滎輸經合五穴既定然後取一穴得時刺之三經者假令膽經受病宜取肝經拘關又取脾經甲膽與乙脾為奇偶三經只取一經余同此例頭部與肩部詳分督脈與任脈異定此言經絡須要精熟督脈任脈一陽一陰在明師手指不可造次明標與本論刺深刺淺之經住痛移疼取相交相貫之逕日法寅卯辰上為標申酉戌下為本巳午未上為標亥子醜下為本故知標病大本病輕淺也交貫之路謂陰交陽會走經去絡配合之處也皆可互標而刺之豈不聞臟腑病而求門海俞募之微門海出入之道俞募終始之處五臟各有俞募經絡滯而求原別交會之道陰俞陰謂之交陽原陽謂之會更從四根三結依標本而刺無不痊素問云太陽根於至陰結於命門陽明根於厲兌終於頏顙少陽根於竅陰結於窗籠太陰根於隱白結於太倉少陰根於湧泉結於廉泉厥陰根於大敦結於玉英此謂三結四根有足太陽根於復溜溜於京骨注於崑崙入於天柱飛揚也足少陽根於竅陰溜於丘墟注於陽輔入於光明天容也足陽明根於厲兌溜於衝陽注於下陵入於人迎豐隆也手太陽根於少澤溜於陽谷注於少海入於天窗支正也手少陽根於關衝溜於陽池注於支溝入於天牖外關也手陽明根於商陽溜於合谷注於陽谿入於天突偏歷也手太陰根於少商溜於太淵注於列缺入於迎香手少陰根於少衝溜於神門注於通里入於極泉手厥陰根於中衝溜於太陵注於內莖入於天池郄門也按素問此篇不載後一段但用八法五門分主客而針無不效用針八法者迎隨一也轉針二也指法三也針頭四也虛實五也陰陽六也提按七也呼吸八也補虛瀉實損益在此八法五門者井滎輸經合也春刺井夏刺滎秋刺經冬刺合四季月刺輸穴五門一月一同一日亦有五門同年辰例客者客邪也主者主氣也知之者刺之無有不效八脈始終連八會本是紀綱十二經絡十二原是為樞要甲光明走乙肝乙蠡溝走甲膽丙腕骨走丁心丁通里走丙小腸戊豐隆走巳脾巳公孫走戊胃庚偏歷走辛肺辛列缺走庚大腸壬飛揚走癸腎癸大鐘走壬膀胱三焦與包絡相為表裡此為十二原穴八脈者奇經也有督脈任脈衝脈帶脈陰維陽維陰蹺陽蹺是為八脈也八會者腑會中脘臟會章門筋會陽陵泉髓會陽輔血會膈俞骨會大杼脈會太淵氣會膻中此八穴陰通八脈相輔而用一日刺六十六穴之法方見幽微一時取十二經之原始知要妙一日刺六十六穴之法用甲丙戊庚壬五穴每時相配乙丁己辛癸一時十穴五六三十兩手兩足相對共計六十穴一時平取十二經之原亦可遍經而已矣原夫補瀉之法非呼吸而在手指速效之功要交正而識本經經云寧失其穴勿失其經寧失其時勿失其氣古人云有八法彈捻循捫攝按爪切用此如神故不再執呼吸也交經繆刺左有病而右畔取瀉絡遠針頭有病而腳上針手足大病左因右侵凌右因左攻擊黃帝云是動則病經氣更取所生者病血絡更然故上下前後左右腹背交經平刺也巨刺與繆刺各異微針與妙刺相通巨微妙毫針之刺繆交平而刺巨隨氣色而針之故不同也觀部分而知經絡之虛實視浮沉而辨臟腑之寒溫此言三部九候刺虛實寒熱表裡也而後刺法行焉且夫先令針耀而慮針損次藏口內而欲針溫古人云口溫針暖毋令針冷與皮肉相合故不損折也目無外視手如握虎心無內慕如待貴人左手重而多按欲令氣散右手輕而徐入不痛之因手法之原先要左手在穴重按有準右手輕捻至分寸自不痛也空心恐怯直立側而多暈背目沉掐坐臥平而沒昏此明用針規矩法式也推於十干十變知孔穴之開合論其五行五臟察日時之旺衰伏如橫弩應若發機陰交陽別而定血暈陰蹺陽維而下胎衣三陰之交與三陽別走陰蹺陽維皆治產難下胎血暈此之謂也痹厥偏枯迎隨俾經絡接續漏崩帶下溫補使氣血依歸風科有一痹言風寒濕冷而為痹也接續刺包焦諸穴女人血下有四崩者急下漏者點滴下滲者浸浸而下帶者隨便溺而下榮衛氣息安定方可刺也靜以久留停針候之用針刺產難崩漏淹涎等病皆可停針留法罔不效也必准者取照海治喉中之閉塞端的處用大鐘治心內之呆癡照海通陰蹺足少陰經也可刺喉閉大鐘走足太陽可刺失心之病大抵疼痛實瀉癢麻虛補體重節痛而俞居心下痞滿而井主百病麻癢不仁清冷者虛也可補之疼痛者實也可瀉之五門所主不同井主心下滿悶滎主氣熱恍惚俞主體節疼痛經主寒熱喘嗽合主氣逆泄利也心脹咽痛針太衝而必除脾痛胃疼瀉公孫而立愈胸滿腹痛刺內關脅疼肋痛刺飛虎筋攣骨痛而補魂門體熱勞嗽而瀉魄戶頭風頭痛刺申脈與金門眼癢眼疼瀉光明與地五瀉陰郄止盜汗治小兒骨蒸刺偏歷利小便醫大人水蠱中風環跳而宜刺虛損天樞而可補此一節俞穴明注不必重解由是午前卯後太陰生而疾溫離左酉南月朔死而速冷子醜寅三時陰中之少陽不足為用也午前卯後乃辰巳之時陽中之老陽可治萬病之虛寒酉戌亥三時陰中之老陰不足生髮也離左酉南乃未申之時陽中之少陰可治萬病之煩躁者溫其虛寒則針而補之灸而呵之冷其煩躁則針而瀉之灸而吹之以丈夫同室女婦人比童子治之循捫彈努留吸母以堅長爪下伸提疾呼子而噓短此言八法虛補其母實瀉其子也動退空歇迎奪右而瀉涼推內進搓隨濟左而補暖此明左右轉針補瀉取手俯手仰法也慎之大危疾患色脈不順而莫針寒熱風陰飢飽醉勞而切忌天有六氣陰陽風雨晦明地有六邪風寒暑濕溫燥人有六情喜怒哀樂好惡共十八事皆禁忌不可針也望不補而晦不瀉弦不奪而朔不濟望日魂魄皆滿血氣堅盈不可補也晦日月空已盡人氣已衰不可瀉也朔日月會也月之陰魄未成日之陽魂始生人氣亦然故不可瀉也上弦月始生氣血始結衛氣始行不可奪也下弦月始減人氣血亦空不可迎也古聖有云針刺之法大禁一月之內晦朔弦望四日謂之四忌精其心而窮其法無灸艾而壞其皮正其理而求其原免投針而失其位位者胃也灸不當其穴損傷榮血肝也刺不中其法喪敗衛氣胃也避灸處而和四肢四十有九禁刺處而除六俞一十有二忌針之穴見針經第四卷抑又聞高皇抱疾未瘥李氏刺巨闕而得蘇太子暴死為厥越人針維會而復醒肩井曲池甄權刺臂痛而復射懸鐘環跳華佗刺躄足而立行秋夫針腰俞而鬼免沉疴王纂針交俞而妖精立出刺肝俞與命門使瞽士視秋毫之末取少陽與交別俾聾夫聽夏蚋之聲嗟夫去聖愈遠斯道漸墜或不得意而散其學或炫其能而犯禁忌愚庸志淺難契於元言至道淵深得之者有幾偶述斯言不敢示諸明達者焉庶幾乎童蒙之心啟天星十一穴歌訣三里內庭穴曲池合谷徹委中配承山下至崑崙絕環跳與陽陵通里與列缺合擔用法擔合截用法截專心常記此莫與閒人說三百六十穴不如十一穴此法少人知金鎖都門鐍將針治病人有如湯沃雪非人莫傳與休把天機泄三里三里在膝下三寸兩筋間能除心腹脹善治胃中寒腸鳴並積聚腫滿膝脛酸勞傷形瘦損氣蠱病諸般人過三旬後針灸眼能寬取穴當舉足得法不為難內庭內庭足兩間胃脈是陽明針治四肢厥喜靜惡聞聲遍身風隱疹伸欠及牙疼瘧病不思食針著便惺惺曲池曲池曲肘里曲著陷中求善治肘中痛偏風手不收挽弓開未得筋緩怎梳頭喉閉促欲絕發熱竟無休遍身風隱疹針灸必能瘳合谷合谷名虎口兩指岐骨間頭痛並面腫瘧疾病諸般熱病汗不出目視暗漫漫齒齲鼻鼽衄喉禁不能言針著量深淺令人便獲安委中委中曲膕里動脈偃中央腰重不能舉沉沉壓脊梁風痹髀樞痛病熱不能涼兩膝難伸屈針下必安康承山承山名魚腹腨下分肉間可治腰背痛久持大便難腳氣膝下腫戰慄腰疼酸霍亂轉筋急穴中刺必安崑崙崑崙足外踝後向足跟尋腨腫腰尻痛腳胯痛難禁頭痛肩背急氣喘上衝心雙足難行履動作即呻吟要得求安樂須將穴下針環跳環跳在髀樞側身下足舒上足曲求得針得主攣拘冷風並濕痹身體或偏枯呆癡針與灸用此沒疏虞陽陵陽陵居膝下一寸外廉中膝腿難伸屈拘攣似老翁欲行行不得冷痹及偏風誠記微微刺方知最有功通里通里腕側後度量一寸中善呻並數欠懊憹及心忪實在四肢腫喉間氣難通虛則不有語苦嘔痛連胸肘膊連臑痛頭腮面頰紅針入三分妙神功甚不窮列缺列缺腕側上手指頭交叉主療偏風患半身時木麻手腕全無力口噤不開牙若能明補瀉諸病恰如拿人神尻神歌訣九部人神歌訣一臍二心三到肘四咽五口六在手七脊八膝九在足輪流順數忌針灸九宮尻神歌訣針家若要辨尻神一歲坤宮外踝輪二震還當牙共腨三頭口乳巽宮陳四中肩尾並窮骨五耳乾宮背面循六管兌宮當手膊七為腰項艮之門八離膝肋毋輕視九坎當臍肘腳存十歲依前零順走明醫仔細與評論其法一歲起坤宮二歲震宮若一十歲仍在坤宮二十歲震宮三十歲巽宮零年隨順一歲一宮順行矣太乙日遊九宮血忌訣凡八節之日各依其宮起一日二日順數一十日仍在本宮二十日三十日零數一例順至四十五日止假如夏至日一日在離宮二日在坎三日在坤四日在震五日在巽至十日復至離宮二十日在坎三十日在坤四十日在震四十一日在巽不宜針灸左肩也余並同用此例六十六穴治證通支別共九十四穴辛手太陰肺經凡五穴為井滎輸經合後二穴為支別共七穴少商為井木在大指端內側去爪甲如韭葉大與爪甲根齊白肉際宛宛中禁灸宜刺血針三分向上三分治咳嗽喘逆咽喉壅閉雙蛾枯樓風魚際為滎火在大指本節後內散脈屈指大維尖針三分治傷風咳嗽頭疼目眩咽乾嘔吐少氣掌心大指發熱痛太淵為輸土在掌後橫紋頭陷中治咳嗽腹脹心疼嘔吐上氣眼疾經渠為經金在寸口陷中脈會處禁灸傷神針向太淵穴治熱病喘逆心痛嘔吐尺澤為合水在肘中紋上動脈臂屈伸橫紋筋骨罅中禁灸治五般腰疼手臂風痹肘疼筋急咳嗽上氣口乾痛癲癇列缺通任脈別走陽明針一分向下在腕側以手交叉取食指盡處兩筋骨罅中治傷寒發熱無汗氣喘寒熱諸嗽有痰心滿腹脹食噎遊走氣七癥八瘕腸風臟毒小便五淋半身不遂腕勞臂痛痎瘧婦人血氣不和胎衣不下小兒脫肛孔最抵手陽明在腕上一寸宛宛中治太陰熱病無汗肘臂屈伸難庚手陽明大腸經正六穴其支二穴共計八穴商陽為井金在大指次指內側去爪甲如韭葉針一分向上三分治喘急氣上牙痛耳聾目赤腫二間為滎水在大指次指第二節後內側陷中針入一分向後三分治肩背強痛以驚喉痹鼻衄牙痛三間為輸木在大指次指第三節後內側捻拳橫紋頭中針一分沿皮向後透合谷穴治胸滿腸鳴泄瀉喉痹咽乾氣喘唇焦牙痛齒齲孕婦勿用合谷為原在大指次指虎口岐骨間動脈中治頭面耳目鼻頰口齒諸疾傷寒發熱無汗小兒疳氣眼疾陽谿為經火在腕中上側兩筋間陷中直刺下治熱病心煩頭風目痛癲癇喜笑如神曲池為合土在肘外輔骨屈伸曲手橫紋頭以手拱胸取之治中風半身不遂遍身風痛瘡疥兩手拘攣紅腫傷寒發熱過經不除偏歷手陽明絡別走太陰在腕後三寸治瘧寒熱無汗目昏耳鳴口喎手痛喉痹鼽衄水蠱小便不利肩髃兩手關係肩頭膊骨正中兩骨間舉臂取之治中風半身不遂手臂攣急筋骨痠痛風熱隱疹丁手少陰心之經正五穴其支二穴共計七穴少衝為井木在手小指內側去爪甲如韭葉治五癇心痛熱病胸滿氣急手攣臂痛掌熱虛悲驚實喜笑少府為滎火在小指本節直勞宮中治虛悲憂少氣心痛實癲癇譫語臂痛背疽初發神門為俞土在掌後兌骨端治瘧惡寒發熱咽乾身熱狂言胸滿腹痛減