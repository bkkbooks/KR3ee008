front:
  text: 流注序天有十干地支十二以干加支常遺其二二一合化五運六氣是以甲乙丙丁戊己庚辛一而不重壬癸壬癸乃重其位陰陽不質五行質氣氣質既形胎生墓死所以甲猶草木原因壬癸氣行於天質具於地質氣之分陰質陽氣故陽主變化陰主專靜而莫自制是以陽府示原陰藏隱秘然夫自子至巳六陽化合自午至亥六陰變化惟壬得一癸二從之為陰陽動靜之樞紐氣數欲兆之時故氣運一周一會於壬癸交接揮持莫為其紀故子午流注真訣甲始於戌而壬亥為終壬子癸丑為終始之地一順一逆一縱一橫一起一止一變一互一合一化一君一臣一佐一使一生一克一母一子一夫一婦交神合氣變化無窮所以一歲總六十穴月日時刻一刻備六十穴歲明月日如之其何以然哉日月三十日則一會於壬河圖一穴居北而括萬極此皇極先天之數所由起五行五氣所由化合子午流注針法之心要也神之變化淵乎哉詩曰甲膽乙肝丙小腸丁心戊胃己脾鄉庚是大腸辛是肺壬屬膀胱癸腎詳地支十二屬十二經行十二時子原是膽醜肝之肺居寅位大腸卯辰胃流傳巳在脾午字便隨心臟定未支須向小腸宜申膀酉腎戌包絡惟有三焦亥上推陰陽經絡所屬手之三陰肺太陰心少陰心包厥陰足之三陰脾太陰腎少陰肝厥陰手之三陽小腸太陽三焦少陽大腸陽明足之三陽膀胱太陽膽少陽胃陽明直年司天歌子午少陰居心腎共相宜卯酉陽明胃大腸當共知寅申少陽膽三焦自有期巳亥厥陰肝心包脈細微辰戌行太陽膀胱及小腸丑未太陰土脾肺是其鄉後序玉龍經者婺源王先生所傳針灸之書也其所託名扁鵲者重其道而神其書也名曰玉龍者蓋以玉為天地之精龍之神變極靈此書之妙用亦猶是也愚自上歲蒙親授以來遊藝於七閩兩浙之間者凡四十年遇病則醫醫必見效信此書之道猶玉之孚尹旁達光焰愈久而不磨龍之行天施澤之無窮變化愈神而人莫得而測也由是拜手述其所以指用識於卷之末云天曆二年歲在己巳武林後學周仲良書於錦山躋壽堂
